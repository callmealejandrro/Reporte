<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock – Real Woman Sie</title>
  <style>
    :root {
      --rose: #c0485a;
      --rose-light: #f9e8eb;
      --rose-mid: #e8a0a8;
      --dark: #2b1c1f;
      --gray: #f5f0f1;
      --border: #e0d0d3;
      --text: #3a2426;
      --badge-bg: #fff0f2;
      --badge-border: #f0b8c0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fdf7f8;
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--rose) 0%, #9b2d3e 100%);
      color: white;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 10px rgba(192,72,90,0.3);
    }
    header .logo-icon {
      font-size: 2rem;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
    header p { font-size: 0.82rem; opacity: 0.85; margin-top: 2px; }

    /* LAYOUT */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* SEARCH BAR */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 2px solid var(--rose-mid);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(192,72,90,0.1);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      color: var(--text);
      background: transparent;
    }
    .search-bar .icon { font-size: 1.2rem; color: var(--rose); }

    /* FILTERS ROW */
    .filters {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .filters-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--rose);
      margin-bottom: 10px;
    }
    .filters-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 160px;
    }
    .filter-group label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* TALLA CHIPS */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
    }
    .chip:hover { border-color: var(--rose); color: var(--rose); }
    .chip.active {
      background: var(--rose);
      border-color: var(--rose);
      color: white;
    }

    /* SELECT */
    select {
      padding: 6px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
      color: var(--text);
      background: white;
      cursor: pointer;
      outline: none;
      min-width: 150px;
    }
    select:focus { border-color: var(--rose); }

    /* TEMPORADA TOGGLE */
    .toggle-group {
      display: flex;
      gap: 6px;
    }
    .toggle-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
    }
    .toggle-btn:hover { border-color: var(--rose); color: var(--rose); }
    .toggle-btn.active {
      background: var(--rose);
      border-color: var(--rose);
      color: white;
    }

    /* CLEAR BUTTON */
    .btn-clear {
      padding: 6px 16px;
      border-radius: 8px;
      border: 1.5px solid var(--rose);
      background: white;
      color: var(--rose);
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: auto;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-clear:hover { background: var(--rose); color: white; }

    /* RESULTS INFO */
    .results-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #888;
    }
    .results-info strong { color: var(--rose); }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    /* CARD */
    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(192,72,90,0.15);
      transform: translateY(-2px);
    }
    .card-prenda {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }
    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      color: var(--rose);
    }
    .badge.talla {
      background: #e8f4ff;
      border-color: #a8d0f0;
      color: #1a6fa8;
    }
    .badge.color {
      background: #f0fff4;
      border-color: #a0d4b0;
      color: #1a7a40;
    }
    .badge.temporada {
      background: #fffbe8;
      border-color: #f0d880;
      color: #8a6800;
    }
    .card-stock {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 0.83rem;
    }
    .stock-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }
    .stock-dot.low { background: #ff9800; }
    .stock-dot.out { background: #e53935; }
    .card-stock span { color: #666; }
    .card-stock strong { color: var(--text); }

    /* EMPTY STATE */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 1rem; }

    @media (max-width: 600px) {
      .filters-row { flex-direction: column; }
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>

<header>

  <div>

  </div>

<div class="container">

      <div class="filter-group">

          <option value="stock-desc">Mayor stock</option>
          <option value="stock-asc">Menor stock</option>
          <option value="talla">Talla</option>
        </select>
      </div>

      <button class="btn-clear" onclick="clearFilters()">✕ Limpiar filtros</button>

  </div>

  <!-- RESULTS INFO -->

    <span id="totalStock">Stock total: <strong>0</strong> unidades</span>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>
</div>

  telaSelect.appendChild(opt);
});
telaSelect.onchange = () => { activeFilters.tela = telaSelect.value; render(); };

// Sort
document.getElementById('sortSelect').onchange = e => { activeFilters.sort = e.target.value; render(); };

// Temporada toggle
document.querySelectorAll('#temporadaToggle .toggle-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#temporadaToggle .toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilters.temporada = btn.dataset.val;
    render();
  };
});

// Search
const searchInput = document.getElementById('searchInput');
const clearSearchBtn = document.getElementById('clearSearch');
searchInput.oninput = () => {
  activeFilters.search = searchInput.value.toLowerCase().trim();
  clearSearchBtn.style.display = activeFilters.search ? 'block' : 'none';
  render();
};
clearSearchBtn.onclick = () => {
  searchInput.value = '';
  activeFilters.search = '';
  clearSearchBtn.style.display = 'none';
  render();
};

function clearFilters() {
  activeFilters = { search: '', talla: '', tela: '', temporada: '', sort: 'prenda' };
  searchInput.value = '';
  clearSearchBtn.style.display = 'none';
  document.querySelectorAll('#tallasChips .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('telaSelect').value = '';
  document.getElementById('sortSelect').value = 'prenda';
  document.querySelectorAll('#temporadaToggle .toggle-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  render();
}

function getFiltered() {
  let results = DATA.filter(item => {
    if (activeFilters.talla && item.TALLA !== activeFilters.talla) return false;
    if (activeFilters.tela && item.TELA !== activeFilters.tela) return false;
    if (activeFilters.temporada && item.TEMPORADA !== activeFilters.temporada) return false;
    if (activeFilters.search) {
      const hay = (item.PRENDA + ' ' + item.COLOR + ' ' + item.TELA + ' ' + item.TALLA).toLowerCase();
      if (!hay.includes(activeFilters.search)) return false;
    }
    return true;
  });

  // Sort
  results.sort((a, b) => {
    if (activeFilters.sort === 'prenda') return a.PRENDA.localeCompare(b.PRENDA);
    if (activeFilters.sort === 'stock-desc') return b.STOCK - a.STOCK;
    if (activeFilters.sort === 'stock-asc') return a.STOCK - b.STOCK;
    if (activeFilters.sort === 'talla') return TALLA_ORDER.indexOf(a.TALLA) - TALLA_ORDER.indexOf(b.TALLA);
    return 0;
  });

  return results;
}

function stockColor(n) {
  if (n >= 3) return '';
  if (n === 2) return 'low';
  return 'out';
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('countShown').textContent = filtered.length;
  const totalUnits = filtered.reduce((s, i) => s + i.STOCK, 0);
  document.getElementById('totalStock').innerHTML = `Stock total: <strong>${totalUnits}</strong> unidades`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>No se encontraron prendas con esos filtros.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <div class="card">
      <div class="card-prenda">${item.PRENDA}</div>
      <div class="card-badges">
        <span class="badge talla">📏 ${item.TALLA}</span>
        <span class="badge">${item.TELA}</span>
        <span class="badge color">🎨 ${item.COLOR}</span>
        <span class="badge temporada">${item.TEMPORADA === 'VERANO' ? '☀️' : '🧥'} ${item.TEMPORADA}</span>
      </div>
      <div class="card-stock">
        <div class="stock-dot ${stockColor(item.STOCK)}"></div>
        <span>Stock:</span>
        <strong>${item.STOCK} unid.</strong>
      </div>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>

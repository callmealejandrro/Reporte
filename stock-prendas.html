<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Stock de Prendas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #e0dbd2;
    --text: #1c1a16;
    --muted: #7a7367;
    --faint: #c5bfb6;
    --green: #0e6b49;
    --green-bg: #e6f5ef;
    --red: #c0320f;
    --red-bg: #fff1ed;
    --amber: #8a5e00;
    --amber-bg: #fff8e1;
    --blue: #1a5fa8;
    --blue-bg: #e8f2ff;
    --primary: #1c6e75;
    --primary-bg: #e3f4f5;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
  }

  /* ── HEADER ── */
  header {
    background: var(--primary);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .header-top h1 {
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 700;
    line-height: 1.2;
  }
  .header-top h1 span { opacity: .7; font-size: .75em; display: block; font-weight: 400; }
  .total-badge {
    background: rgba(255,255,255,.2);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── SEARCH BOX ── */
  .searchbox {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,.55);
    pointer-events: none;
  }
  #q {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1.5px solid rgba(255,255,255,.25);
    border-radius: 14px;
    background: rgba(255,255,255,.15);
    color: white;
    font-size: 15px;
    outline: none;
    transition: background .15s, border-color .15s;
    -webkit-appearance: none;
  }
  #q::placeholder { color: rgba(255,255,255,.55); }
  #q:focus {
    background: white;
    color: var(--text);
    border-color: white;
  }
  #q:focus ~ svg { color: var(--muted); }
  #clearBtn {
    background: rgba(255,255,255,.2);
    border: none;
    color: white;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
  }
  #clearBtn:hover { background: rgba(255,255,255,.3); }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 20px;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .chip.on {
    border-color: var(--primary);
    background: var(--primary-bg);
    color: var(--primary);
  }

  /* ── STATS BAR ── */
  .statsbar {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .statsbar::-webkit-scrollbar { display: none; }
  .stat {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 16px;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  .stat-value { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.1; }

  /* ── GRID ── */
  main {
    padding: 16px 16px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.04);
    transition: box-shadow .15s, transform .15s;
  }
  .card:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,.1);
    transform: translateY(-2px);
  }
  .card-head {
    padding: 16px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .card-name {
    font-size: 16px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    border-radius: 999px;
    padding: 4px 10px;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .badge.talla { background: var(--blue-bg); color: var(--blue); border-color: transparent; }
  .badge.color { background: #f3f0fc; color: #5a3fad; border-color: transparent; }
  .badge.tela  { background: var(--bg); color: var(--muted); }

  /* ── PRICE BLOCK ── */
  .card-prices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 16px 16px;
  }
  .price-block {
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
  }
  .price-block .pb-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 4px;
  }
  .price-block .pb-value {
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 900;
    line-height: 1;
  }
  .price-block .pb-sub {
    font-size: 11px;
    margin-top: 3px;
    opacity: .65;
  }
  .pb-disc { background: var(--red-bg); color: var(--red); }
  .pb-disc.high { background: #ffe0d6; color: #b02000; }
  .pb-disc.med  { background: var(--amber-bg); color: var(--amber); }
  .pb-disc.low  { background: var(--green-bg); color: var(--green); }
  .pb-final     { background: var(--primary-bg); color: var(--primary); }
  .pb-final.no-price { background: var(--bg); color: var(--faint); }

  .card-stock {
    padding: 0 16px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .stock-dot {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }
  .stock-dot::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    vertical-align: middle;
  }
  .orig-price {
    font-size: 12px;
    color: var(--faint);
    text-decoration: line-through;
  }

  /* ── EMPTY STATE ── */
  #empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 56px 20px;
    color: var(--muted);
  }
  #empty .emoji { font-size: 52px; margin-bottom: 16px; }
  #empty h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }

  /* ── HIGHLIGHT ── */
  mark {
    background: #fff08a;
    color: inherit;
    border-radius: 3px;
    padding: 0 1px;
  }

  @media (max-width: 480px) {
    header { padding: 16px 14px 12px; }
    .statsbar, .filters { padding-left: 14px; padding-right: 14px; }
    main { padding: 12px 10px 40px; }
    #grid { gap: 10px; }
  }
</style>
</head>

<header>

// ── normalise for search ──────────────────────────────────────
const norm = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'')
                         .replace(/[^a-z0-9 ]/gi,'').toLowerCase().trim();
STOCK.forEach(x => x._idx = norm([x.p,x.t,x.c,x.f].join(' ')));

// ── money ──────────────────────────────────────────────────────
const sol = v => v > 0
  ? `S/ ${v.toFixed(2).replace(/\.00$/,'')}`
  : 'Sin precio';

// ── DOM refs ──────────────────────────────────────────────────
const $q       = document.getElementById('q');
const $grid    = document.getElementById('grid');
const $sCount  = document.getElementById('sCount');
const $sBest   = document.getElementById('sBest');
const $sLow    = document.getElementById('sLow');
const $sHigh   = document.getElementById('sHigh');
const $total   = document.getElementById('totalBadge');
const $sizes   = document.getElementById('sizeFilters');

$total.textContent = `${STOCK.length} unidades`;

// ── size chips ────────────────────────────────────────────────
const sizes = [...new Set(STOCK.map(x => x.t))].sort((a,b) => {
  const order = ['M','L','XL','2XL','3XL','4XL'];
  return (order.indexOf(a)+1||99) - (order.indexOf(b)+1||99);
});
let activeSize = '';
const chips = {};
sizes.forEach(sz => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = sz;
  btn.addEventListener('click', () => {
    activeSize = activeSize === sz ? '' : sz;
    Object.entries(chips).forEach(([k,el]) => el.classList.toggle('on', k === activeSize));
    render();
  });
  chips[sz] = btn;
  $sizes.appendChild(btn);
});

// ── highlight helper ──────────────────────────────────────────
function hl(text, words) {
  if (!words.length) return text;
  const safe = words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  return text.replace(new RegExp(`(${safe.join('|')})`, 'gi'),
    m => `<mark>${m}</mark>`);
}

// ── discount colour class ──────────────────────────────────────
function discClass(d) {
  if (d >= 50) return 'high';
  if (d >= 30) return 'med';
  return 'low';
}

// ── build card HTML ───────────────────────────────────────────
function cardHTML(item, words) {
  const hasPrice = item.pv > 0;
  const hlP = t => hl(t, words);

  return `
  <article class="card">
    <div class="card-head">
      <div class="card-name">${hlP(item.p)}</div>
      <div class="card-tags">
        <span class="badge talla">Talla ${hlP(item.t)}</span>
        <span class="badge color">${hlP(item.c)}</span>
        <span class="badge tela">${hlP(item.f)}</span>
      </div>
    </div>
    <div class="card-prices">
      <div class="price-block pb-disc ${hasPrice ? discClass(item.d) : ''}">
        <div class="pb-label">Descuento</div>
        <div class="pb-value">${hasPrice && item.d > 0 ? item.d + '%' : '—'}</div>
        <div class="pb-sub">sobre precio normal</div>
      </div>
      <div class="price-block pb-final ${hasPrice ? '' : 'no-price'}">
        <div class="pb-label">Precio final</div>
        <div class="pb-value">${sol(item.pv)}</div>
        <div class="pb-sub">precio de venta</div>
      </div>
    </div>
    <div class="card-stock">
      <span class="stock-dot">En stock</span>
      <span class="orig-price">${item.pr > 0 ? 'Normal: '+sol(item.pr) : ''}</span>
    </div>
  </article>`;
}

// ── main render ───────────────────────────────────────────────
function render() {
  const raw   = $q.value.trim();
  const words = norm(raw).split(/\s+/).filter(Boolean);
  const filtered = STOCK.filter(item => {
    const matchQ    = words.length === 0 || words.every(w => item._idx.includes(w));
    const matchSize = !activeSize || item.t === activeSize;
    return matchQ && matchSize;
  });

  $sCount.textContent = filtered.length;
  const pvs = filtered.filter(x => x.pv > 0).map(x => x.pv);
  const ds  = filtered.filter(x => x.d  > 0).map(x => x.d);
  $sBest.textContent = ds.length  ? Math.max(...ds)  + '%'            : '—';
  $sLow.textContent  = pvs.length ? sol(Math.min(...pvs))             : '—';
  $sHigh.textContent = pvs.length ? sol(Math.max(...pvs))             : '—';

  if (!filtered.length) {
    $grid.innerHTML = `<div id="empty">
      <div class="emoji">🔍</div>
      <h3>Sin resultados</h3>
      <p>Prueba con otro nombre, tela o color.</p>
    </div>`;
    return;
  }

  $grid.innerHTML = filtered.map(item => cardHTML(item, words)).join('');
}

// ── events ────────────────────────────────────────────────────
$q.addEventListener('input', render);
document.getElementById('clearBtn').addEventListener('click', () => {
  $q.value = '';
  activeSize = '';
  Object.values(chips).forEach(el => el.classList.remove('on'));
  render();
  $q.focus();
});

render();
</script>
